<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Real-Time Chat - Built by Afsan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .status {
            padding: 10px 20px;
            background: #f3f4f6;
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
            border-bottom: 1px solid #e5e7eb;
        }

        .status.connected {
            background: #d1fae5;
            color: #065f46;
        }

        .status.disconnected {
            background: #fee2e2;
            color: #991b1b;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-username {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #667eea;
        }

        .message.own .message-username {
            color: rgba(255,255,255,0.9);
        }

        .message-text {
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 4px;
        }

        .message.own .message-time {
            color: rgba(255,255,255,0.7);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .username-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .message-input {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .system-message {
            text-align: center;
            color: #9ca3af;
            font-size: 0.85rem;
            font-style: italic;
            margin: 20px 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>⚡ Real-Time Chat</h1>
            <p>Built with AWS WebSockets + Lambda + DynamoDB</p>
        </div>

        <div class="status" id="status">
            🔴 Disconnected - Click Connect
        </div>

        <div class="messages" id="messages">
            <div class="system-message">
                Welcome! Enter your name and connect to start chatting 💬
            </div>
        </div>

        <div class="input-area">
            <div class="username-input">
                <input 
                    type="text" 
                    id="usernameInput" 
                    placeholder="Your name..."
                    value="Afsan"
                >
                <button id="connectBtn" onclick="toggleConnection()">Connect</button>
            </div>
            <div class="message-input">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type a message..."
                    disabled
                    onkeypress="handleKeyPress(event)"
                >
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ REPLACE THIS WITH YOUR WEBSOCKET URL FROM STEP 4!
        const WEBSOCKET_URL = 'wss://8zd3ft6k5k.execute-api.ap-south-1.amazonaws.com/production/';
        
        let ws = null;
        let username = 'Afsan';
        let isConnected = false;

        function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Please enter your name!');
                return;
            }

            // Check if WebSocket URL is configured
            if (WEBSOCKET_URL.includes('YOUR-API-ID')) {
                alert('⚠️ Please update WEBSOCKET_URL in the code with your actual API Gateway WebSocket URL!');
                return;
            }

            updateStatus('Connecting...', 'disconnected');

            ws = new WebSocket(WEBSOCKET_URL);

            ws.onopen = () => {
                isConnected = true;
                updateStatus('✅ Connected', 'connected');
                document.getElementById('connectBtn').textContent = 'Disconnect';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('usernameInput').disabled = true;
                
                addSystemMessage(`${username} joined the chat`);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addMessage(data.username, data.message, data.timestamp, false);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('❌ Connection error', 'disconnected');
            };

            ws.onclose = () => {
                isConnected = false;
                updateStatus('🔴 Disconnected', 'disconnected');
                document.getElementById('connectBtn').textContent = 'Connect';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('usernameInput').disabled = false;
                
                addSystemMessage('Connection closed');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message || !isConnected) return;

            // Send message through WebSocket
            ws.send(JSON.stringify({
                action: 'sendmessage',
                username: username,
                message: message
            }));

            // Add to UI immediately (will also receive via broadcast)
            addMessage(username, message, Date.now() / 1000, true);

            // Clear input
            messageInput.value = '';
        }

        function addMessage(user, text, timestamp, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message' + (isOwn ? ' own' : '');

            const time = new Date(timestamp * 1000).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-username">${user}</div>
                    <div class="message-text">${escapeHtml(text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateStatus(text, className) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + className;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-focus on message input when connected
        document.getElementById('messageInput').addEventListener('focus', function() {
            this.select();
        });
    </script>
</body>
</html>
